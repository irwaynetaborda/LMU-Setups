<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mural de Corridas — Taborda Setups</title>
  <meta name="description" content="Calendário de corridas do Le Mans Ultimate." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏁</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
</head>
<body>

  <!-- ── HEADER ────────────────────────────────────────────── -->
  <header class="header">
    <a href="index.html" class="logo">
      <span class="logo-flag">🏁</span>
      <span>Taborda<em>Setups</em></span>
    </a>
    <nav class="header-nav">
      <a href="index.html" class="nav-link">Setups</a>
      <a href="fuel.html" class="nav-link">Combustível</a>
      <a href="schedule.html" class="nav-link active">Corridas Diárias</a>
    </nav>
    <div class="header-actions">
      <button class="btn btn-ghost auth-only" onclick="Auth.logout()" title="Sair do sistema" style="display:none">Sair</button>
      <a href="login.html" class="btn btn-primary unauth-only" style="display:none">Login</a>
    </div>
  </header>

  <!-- ── MAIN ─────────────────────────────────────────────── -->
  <main class="main">

    <div class="schedule-header animate-in">
      <div class="container">
        <h1>Corridas <em>Diárias</em></h1>
        <p id="schedule-subtitle">Le Mans Ultimate Online Championships</p>
        
        <div class="schedule-tabs" style="align-items: center;">
          <button class="schedule-tab active" data-tab="daily">Daily Races</button>
          <button class="schedule-tab" data-tab="weekly">Weekly Races</button>
        </div>
      </div>
    </div>

    <div class="schedule-content animate-in" style="animation-delay:100ms">
      <div class="container">
        
        <!-- Tab Content: Daily -->
        <div class="schedule-pane active" id="pane-daily">
          <!-- Renderizado via JS -->
        </div>

        <!-- Tab Content: Weekly -->
        <div class="schedule-pane" id="pane-weekly">
          <!-- Renderizado via JS -->
        </div>

      </div>
    </div>



  </main>

  <script src="js/schedule-data.js"></script>
  <script src="js/track-maps.js"></script>
  <script src="js/schedule.js"></script>
</body>
</html>
