<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taborda Setups — Le Mans Ultimate</title>
  <meta name="description" content="Minha biblioteca pessoal de setups para Le Mans Ultimate. Consulte configurações por carro, pista e condição antes de cada corrida." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏁</text></svg>" />
  <link rel="stylesheet" href="css/style.css?v=1.9" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=1.9"></script>
  <script src="js/auth.js?v=1.9"></script>
</head>
<body>

  <!-- ── HEADER ────────────────────────────────────────────── -->
  <header class="header">
    <a href="index.html" class="logo" aria-label="Taborda Setups">
      <span class="logo-flag">🏁</span>
      <span>Taborda<em>Setups</em></span>
    </a>

    <nav class="header-nav" aria-label="Navegação principal">
      <a href="index.html" class="nav-link active" id="nav-setups">Setups</a>
      <a href="fuel.html" class="nav-link" id="nav-fuel">Combustível</a>
      <a href="schedule.html" class="nav-link" id="nav-schedule">Corridas Diárias</a>
    </nav>

    <div class="header-actions" id="header-auth-area">
      <!-- Preenchido dinamicamente por auth.js -->
    </div>
  </header>

  <!-- ── MAIN ─────────────────────────────────────────────── -->
  <main class="main" id="main">

    <!-- PAGE HERO — apenas título + wallpaper -->
    <section class="page-hero" aria-label="Resumo">
      <div class="container">
        <div class="page-hero-inner">
          <h1>LMU <em>Setups</em></h1>
          <p>Explore setups compartilhados pela comunidade, gerencie suas configurações privadas com segurança e consulte estratégias exclusivas para dominar as pistas.</p>
        </div>
      </div>
    </section>

    <!-- STATS BAND -->
    <section class="stats-band" aria-label="Estatísticas">
      <div class="container">
        <div class="stats-grid stagger" id="stats-grid">

          <!-- Total -->
          <div class="stat-card animate-in">
            <div class="stat-card-icon">🏎️</div>
            <div class="stat-card-body">
              <div class="stat-value" id="stat-total">0</div>
              <div class="stat-label">Total de Setups</div>
            </div>
          </div>

          <!-- Nota Média -->
          <div class="stat-card animate-in" style="animation-delay:60ms">
            <div class="stat-card-icon">⭐</div>
            <div class="stat-card-body">
              <div class="stat-value accent" id="stat-rating">—</div>
              <div class="stat-label">Nota Média</div>
            </div>
          </div>

          <!-- Pista Mais Usada -->
          <div class="stat-card animate-in" style="animation-delay:120ms">
            <div class="stat-card-icon">📍</div>
            <div class="stat-card-body">
              <div class="stat-value stat-value-track" id="stat-top-track">—</div>
              <div class="stat-label">Pista Mais Usada</div>
            </div>
          </div>

          <!-- Por Classe -->
          <div class="stat-card stat-card-classes animate-in" style="animation-delay:180ms;">
            <div class="stat-card-icon">⚡</div>
            <div class="stat-card-body">
              <div class="class-bars" id="class-bars"></div>
            </div>
          </div>

        </div>
      </div>
    </section>


    <!-- FILTROS -->
    <section class="filters-wrap" aria-label="Filtros">
      <div class="container">
        <div class="filters-inner">

          <div class="filter-group">
            <label class="filter-label" for="f-class">Classe</label>
            <select class="filter-select" id="f-class" aria-label="Filtrar por classe">
              <option value="">Todas as Classes</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="filter-label" for="f-car">Carro</label>
            <select class="filter-select" id="f-car" aria-label="Filtrar por carro">
              <option value="">Todos os Carros</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="filter-label" for="f-track">Pista</label>
            <select class="filter-select" id="f-track" aria-label="Filtrar por pista">
              <option value="">Todas as Pistas</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="filter-label" for="f-condition">Condição</label>
            <select class="filter-select" id="f-condition" aria-label="Filtrar por condição">
              <option value="">Qualquer Condição</option>
              <option value="dry">☀️ Seco</option>
              <option value="wet">🌧️ Chuva</option>
              <option value="mixed">⛅ Misto</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="filter-label" for="f-session">Sessão</label>
            <select class="filter-select" id="f-session" aria-label="Filtrar por tipo de sessão">
              <option value="">Qualquer Sessão</option>
              <option value="qualifying">⏱️ Qualifying</option>
              <option value="sprint">🏁 Sprint Race</option>
              <option value="endurance">🕐 Endurance</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="filter-label" for="f-search">Busca</label>
            <input
              type="search"
              class="filter-input"
              id="f-search"
              placeholder="Buscar setup..."
              aria-label="Buscar setup por texto"
            />
          </div>

          <div class="filters-spacer"></div>

          <button class="btn-reset" id="btn-reset-filters" type="button">Limpar filtros</button>
        </div>
      </div>
    </section>

    <!-- TABELA DE SETUPS -->
    <section class="setups-section">
      <div class="container">

        <div class="setups-header">
          <div class="visibility-tabs" id="visibility-tabs">
            <button class="visibility-tab active" data-tab="public" role="tab" aria-selected="true">Setups Públicos</button>
            <button class="visibility-tab" data-tab="private" role="tab" aria-selected="false">Setups Privados</button>
          </div>
          <span class="setups-count" id="setups-count">0 setups</span>
        </div>

        <div id="setups-container">
          <!-- Renderizado por main.js -->
        </div>

      </div>
    </section>

    <!-- Mensagem removida: setups agora são públicos para visualização -->

  </main>

  <!-- Botão Flutuante (FAB) removido a pedido do usuário -->

  <!-- Container para notificações temporárias (toast) -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- Scripts Javascript -->
  <script src="js/data.js?v=1.9"></script>
  <script src="js/storage.js?v=1.9"></script>
  <script src="js/seeds.js?v=1.9"></script>
  <script src="js/main.js?v=1.9"></script>
</body>
</html>
