name: Supabase Daily Backup

on:
  schedule:
    # Rodará todos os dias à meia-noite UTC (21h00 no horário de Brasília)
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite executar manualmente o backup a qualquer momento no site do GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar cliente do PostgreSQL 17
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [arch=amd64 signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Efetuar dump do banco de dados (Backup)
        run: |
          pg_dump "${{ secrets.DATABASE_URL }}" > backup_lmu_setups_$(date +%Y-%m-%d).sql

      - name: Guardar o backup como artefato no GitHub
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup_lmu_setups_*.sql
          retention-days: 30 # Armazena cada backup por 30 dias gratuitamente no GitHub
